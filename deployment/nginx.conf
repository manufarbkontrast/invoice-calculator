# Nginx-Konfiguration für invoice-calculator
# Diese Datei sollte nach /etc/nginx/sites-available/invoice-calculator kopiert werden

server {
    listen 80;
    server_name invoice.crftn.de www.invoice.crftn.de;

    # Weiterleitung zu HTTPS (optional, wenn SSL-Zertifikat vorhanden)
    # return 301 https://$server_name$request_uri;

    # Oder direkt ohne HTTPS (für Entwicklung/Test):
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts für größere Dateien
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Größere Dateien für Uploads
    client_max_body_size 50M;
}

